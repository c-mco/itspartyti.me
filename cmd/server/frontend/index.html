<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>itspartyti.me</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- AUTH -->
  <div id="auth" hidden>
    <div class="auth-box">
      <div class="auth-brand">
        <h1>itspartyti.me</h1>
        <p>your drinks, honestly</p>
      </div>
      <form id="auth-form" novalidate>
        <div class="field">
          <label for="f-user">username</label>
          <input id="f-user" type="text" autocomplete="username" required spellcheck="false" />
        </div>
        <div class="field">
          <label for="f-pass">password</label>
          <input id="f-pass" type="password" autocomplete="current-password" required />
        </div>
        <div id="auth-err" class="form-err" role="alert" aria-live="polite"></div>
        <button type="submit" id="auth-submit" class="btn-primary">log in</button>
      </form>
      <button id="auth-toggle" class="auth-switch-btn">don't have an account? register →</button>
    </div>
  </div>

  <!-- APP -->
  <div id="app" hidden>

    <header class="hdr">
      <span class="hdr-brand">itspartyti.me</span>
      <div class="hdr-end">
        <span id="hdr-user" class="hdr-user"></span>
        <button id="btn-logout" class="btn-ghost sm">logout</button>
      </div>
    </header>

    <nav class="viewnav" role="tablist" aria-label="View">
      <button class="vtab is-active" role="tab" aria-selected="true"  data-view="graph">graph</button>
      <button class="vtab"           role="tab" aria-selected="false" data-view="month">month</button>
      <button class="vtab"           role="tab" aria-selected="false" data-view="river">river</button>
    </nav>

    <main class="panels">

      <!-- GRAPH PANEL -->
      <section id="panel-graph" class="panel">
        <div id="graph-ctrl" class="panel-ctrl"></div>
        <div id="graph-mount"></div>
        <div class="legend">
          <span class="leg sober"></span>
          <span class="leg light"></span>
          <span class="leg moderate"></span>
          <span class="leg heavy"></span>
          <span class="leg none"></span>
          <span class="leg-txt">0 · 1–2 · 3–4 · 5+ · —</span>
        </div>
      </section>

      <!-- MONTH PANEL -->
      <section id="panel-month" class="panel" hidden>
        <div class="panel-ctrl">
          <button class="btn-ghost sm" id="btn-mo-prev" aria-label="Previous month">←</button>
          <span class="panel-title" id="mo-label"></span>
          <button class="btn-ghost sm" id="btn-mo-next" aria-label="Next month">→</button>
        </div>
        <div id="mo-grid" class="mo-grid" role="grid" aria-label="Monthly calendar"></div>
      </section>

      <!-- RIVER PANEL -->
      <section id="panel-river" class="panel" hidden>
        <div class="river-outer">
          <div class="river-y" id="river-y"></div>
          <div class="river-scroll" id="river-scroll" tabindex="0" aria-label="Drink timeline">
            <div class="river-bars" id="river-bars"></div>
            <div class="river-months" id="river-months"></div>
          </div>
        </div>
      </section>

    </main>

    <!-- STATS -->
    <div class="stats-row" aria-label="Stats">
      <div class="stat"><span class="stat-n" id="s-week">—</span><span class="stat-l">week</span></div>
      <div class="stat"><span class="stat-n" id="s-month">—</span><span class="stat-l">month</span></div>
      <div class="stat"><span class="stat-n" id="s-all">—</span><span class="stat-l">all time</span></div>
      <div class="stat"><span class="stat-n" id="s-streak">—</span><span class="stat-l">streak · best <span id="s-best">—</span></span></div>
      <div class="stat"><span class="stat-n" id="s-avg">—</span><span class="stat-l">avg/day</span></div>
      <div class="stat"><span class="stat-n" id="s-sober">—</span><span class="stat-l">sober %</span></div>
    </div>

    <!-- ACCOUNT -->
    <details class="acct">
      <summary>account</summary>
      <div class="acct-body">
        <p>Permanently delete your account and all data. This cannot be undone.</p>
        <button class="btn-danger" id="btn-del-acct">delete account</button>
      </div>
    </details>

    <!-- QUICK ADD -->
    <button class="qadd-btn" id="btn-qa" aria-label="Add one drink to today">+1</button>

    <!-- TOAST -->
    <div class="toast" id="toast" hidden role="status" aria-live="polite">
      <span id="toast-msg" class="toast-msg"></span>
      <button class="toast-undo" id="toast-undo" type="button">undo</button>
    </div>

  </div><!-- /app -->

  <script src="/app.js"></script>
</body>
</html>

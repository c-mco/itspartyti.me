<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>itspartyti.me</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <div id="auth" hidden>
    <div class="auth-box">
      <h1>itspartyti.me</h1>
      <p class="tagline">your drinks, honestly</p>
      <form id="auth-form" novalidate>
        <input id="f-user" type="text" placeholder="username" autocomplete="username" spellcheck="false" required />
        <input id="f-pass" type="password" placeholder="password" autocomplete="current-password" required />
        <p id="auth-err" class="err" role="alert" aria-live="polite"></p>
        <button type="submit" id="auth-btn">log in</button>
      </form>
      <button id="auth-toggle" class="link-btn">no account? register →</button>
    </div>
  </div>

  <div id="app" hidden>

    <header class="hdr">
      <span class="logo">itspartyti.me</span>
      <div class="hdr-right">
        <button class="user-btn" id="user-btn" aria-expanded="false" aria-haspopup="true">
          <span id="hdr-name"></span>
          <svg width="10" height="6" viewBox="0 0 10 6" aria-hidden="true"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>
        </button>
        <div class="user-menu" id="user-menu" hidden role="menu">
          <button id="btn-logout" role="menuitem">log out</button>
          <button id="btn-del" class="danger" role="menuitem">delete account</button>
        </div>
      </div>
    </header>

    <div class="today">
      <span class="today-date" id="today-date"></span>
      <div class="stepper">
        <button class="step-btn" id="btn-minus" aria-label="Remove one drink">−</button>
        <span class="step-val" id="today-n">0</span>
        <button class="step-btn" id="btn-plus" aria-label="Add one drink">+</button>
      </div>
    </div>

    <div class="stats-bar">
      <div class="stat"><b id="s-week">—</b><span>week</span></div>
      <div class="stat"><b id="s-month">—</b><span>month</span></div>
      <div class="stat"><b id="s-all">—</b><span>all time</span></div>
      <div class="stat"><b id="s-streak">—</b><span>streak</span></div>
    </div>

    <nav class="tabs">
      <button class="tab active" data-view="graph">graph</button>
      <button class="tab" data-view="feed">feed</button>
    </nav>

    <div id="view-graph" class="view">
      <div class="day-hdrs">
        <span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span><span>Su</span>
      </div>
      <div class="graph-wrap">
        <div class="graph" id="graph"></div>
        <div class="cell-panel" id="cell-panel" hidden>
          <div class="cp-date" id="cp-date"></div>
          <div class="stepper">
            <button class="step-btn" id="cp-minus">−</button>
            <span class="step-val" id="cp-n">0</span>
            <button class="step-btn" id="cp-plus">+</button>
          </div>
          <textarea class="cp-note" id="cp-note" placeholder="note…" rows="2"></textarea>
          <button class="cp-del" id="cp-del">delete entry</button>
        </div>
      </div>
    </div>

    <div id="view-feed" class="view" hidden>
      <div class="feed" id="feed"></div>
    </div>

  </div>

  <script src="/app.js"></script>
</body>
</html>

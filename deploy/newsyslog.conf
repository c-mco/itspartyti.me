# itspartyti.me log rotation
# Install: sudo cp deploy/newsyslog.conf /etc/newsyslog.d/itspartyti.me.conf
#          sudo newsyslog -v
#
# Format: logfile  mode  count  size(KB)  when  flags
# Rotates when file exceeds 1MB, keeps 7 compressed backups

/Users/cam/itspartyti.me/logs/out.log  640  7  1024  *  J
/Users/cam/itspartyti.me/logs/err.log  640  7  1024  *  J
